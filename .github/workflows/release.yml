name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@clanker.zone"
          git config --global init.defaultBranch main

      - uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify version matches release tag
        run: |
          EXPECTED="${{ github.event.release.tag_name }}"
          EXPECTED="${EXPECTED#v}"
          ACTUAL=$(grep 'VERSION_NAME=' gradle.properties | cut -d= -f2)
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Version mismatch! gradle.properties=$ACTUAL but release tag=$EXPECTED"
            exit 1
          fi

      - name: Build and test
        run: ./gradlew build

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_RELEASE_SIGNING_ENABLED: true
